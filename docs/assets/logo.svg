<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="tile1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b2735"/>
      <stop offset="1" stop-color="#0a0e13"/>
    </linearGradient>
    <radialGradient id="scope1" cx="256" cy="256" r="170" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0e3a42" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#0a0e13" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sweep1" cx="256" cy="256" r="170" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#63E6F4" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#63E6F4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="promptGlow1" cx="256" cy="262" r="70" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FBBF24" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#FBBF24" stop-opacity="0"/>
    </radialGradient>
    <filter id="b1" x="-70%" y="-70%" width="240%" height="240%"><feGaussianBlur stdDeviation="5"/></filter>
  </defs>

  <rect width="512" height="512" rx="114" fill="url(#tile1)"/>
  <rect x="6" y="6" width="500" height="500" rx="110" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2"/>

  <!-- scope glow -->
  <circle cx="256" cy="256" r="170" fill="url(#scope1)"/>

  <!-- crosshair -->
  <line x1="86" y1="256" x2="426" y2="256" stroke="#57D0E0" stroke-width="2" opacity="0.10"/>
  <line x1="256" y1="86" x2="256" y2="426" stroke="#57D0E0" stroke-width="2" opacity="0.10"/>

  <!-- rings -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="#57D0E0" stroke-width="4" opacity="0.22"/>
  <circle cx="256" cy="256" r="108" fill="none" stroke="#57D0E0" stroke-width="4" opacity="0.40"/>

  <!-- sweep beam -->
  <path d="M256 256 L314.1 96.3 A170 170 0 0 1 423.4 226.5 Z" fill="url(#sweep1)"/>
  <line x1="256" y1="256" x2="314.1" y2="96.3" stroke="#8CF0FB" stroke-width="3" opacity="0.6" stroke-linecap="round"/>

  <!-- status blips -->
  <circle cx="326" cy="150" r="17" fill="#34D399" opacity="0.35" filter="url(#b1)"/>
  <circle cx="326" cy="150" r="8.5" fill="#34D399"/>
  <circle cx="182" cy="206" r="15" fill="#FBBF24" opacity="0.30" filter="url(#b1)"/>
  <circle cx="182" cy="206" r="7.5" fill="#FBBF24"/>
  <circle cx="210" cy="330" r="15" fill="#F87171" opacity="0.30" filter="url(#b1)"/>
  <circle cx="210" cy="330" r="7.5" fill="#F87171"/>

  <!-- terminal prompt -->
  <circle cx="256" cy="262" r="66" fill="url(#promptGlow1)"/>
  <polyline points="225,242 249,260 225,278" fill="none" stroke="#FBBF24" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="261" y1="278" x2="289" y2="278" stroke="#FBBF24" stroke-width="16" stroke-linecap="round"/>
</svg>
